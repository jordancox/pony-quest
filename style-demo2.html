function makePanel(parent, title, w, h, scale) {
  const div = document.createElement('div');
  div.className = 'panel';
  const lbl = document.createElement('h3');
  lbl.textContent = title;
  div.appendChild(lbl);
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  c.style.width = (w*scale)+'px'; c.style.height = (h*scale)+'px';
  div.appendChild(c);
  parent.appendChild(div);
  return c.getContext('2d');
}

  for(let y=0;y<data.length;y++)

      if(data[y][x]===0) continue;
      ctx.fillStyle=pal[data[y][x]];
      ctx.fillRect(px+x, py+y, 1, 1);
    }
}

// ============================================================
// PAINTING HELPERS
// ============================================================
function fill(ctx,c) { ctx.fillStyle=c; ctx.fill(); }
function stroke(ctx,c,w) { ctx.strokeStyle=c; ctx.lineWidth=w||1; ctx.stroke(); }

// Organic filled shape from points
function shape(ctx, pts, c) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) {
    const p=pts[i];
    if(p.length===6) ctx.bezierCurveTo(p[0],p[1],p[2],p[3],p[4],p[5]);
    else if(p.length===4) ctx.quadraticCurveTo(p[0],p[1],p[2],p[3]);
    else ctx.lineTo(p[0],p[1]);
    }
  ctx.closePath();
  ctx.fillStyle=c; ctx.fill();
}

// Organic stroked line
function curveLine(ctx, pts, c, w) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) {
    const p=pts[i];
    if(p.length===6) ctx.bezierCurveTo(p[0],p[1],p[2],p[3],p[4],p[5]);
    else if(p.length===4) ctx.quadraticCurveTo(p[0],p[1],p[2],p[3]);
    else ctx.lineTo(p[0],p[1]);
  }
  ctx.strokeStyle=c; ctx.lineWidth=w||1; ctx.stroke();
}

// Soft gradient rectangle
function gRect(ctx,x,y,w,h,c1,c2,vertical) {
  const g=vertical!==false
    ? ctx.createLinearGradient(x,y,x,y+h)
    : ctx.createLinearGradient(x,y,x+w,y);
  g.addColorStop(0,c1);g.addColorStop(1,c2);
  ctx.fillStyle=g;ctx.fillRect(x,y,w,h);
}

// Radial glow
function glow(ctx,cx,cy,r,c1,c2) {
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  g.addColorStop(0,c1);g.addColorStop(1,c2);
  ctx.fillStyle=g;
  ctx.fillRect(cx-r,cy-r,r*2,r*2);
}

// Dither two colours in a rect (Sierra-style)
function dither(ctx,x,y,w,h,c1,c2) {
  for(let py=0;py<h;py++) for(let px=0;px<w;px++) {
    ctx.fillStyle=((px+py)%2===0)?c1:c2;
    ctx.fillRect(x+px,y+py,1,1);
  }
}

function R(ctx,x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}

    R(ctx,5,yy,24,9,'#748080');
    R(ctx,5,yy,24,1,'#889090');
    R(ctx,5,yy+8,24,1,'#606868');
    R(ctx,14,yy+3,6,3,'#a0a8a8'); // handle
    R(ctx,14,yy+3,6,1,'#b0b8b8');
  }

  // === DESK ===
  // Desk top surface
  shape(ctx,[[4,113],[180,113],[178,117],[2,117]],'#6a4420');
  gRect(ctx,4,113,176,2,'#7a5430','#6a4420');
  R(ctx,4,113,176,1,'#8a6440');
  // Desk front panel
  gRect(ctx,6,117,172,28,'#5a3410','#4a2808');
  R(ctx,6,117,172,1,'#6a4420');
  // Drawer handles on desk
  R(ctx,30,128,12,2,'#7a5a30');R(ctx,90,128,12,2,'#7a5a30');R(ctx,150,128,12,2,'#7a5a30');
  // Desk legs
  R(ctx,8,145,5,11,'#4a2808');R(ctx,170,145,5,11,'#4a2808');

  // === DESK OBJECTS ===
  // Phone
  R(ctx,22,102,20,11,'#1a1a1a');
  R(ctx,24,100,16,3,'#222');
  // Handset cradle
  shape(ctx,[[20,98],[26,96],[26,100],[20,100]],'#1a1a1a');
  shape(ctx,[[38,98],[44,96],[44,100],[38,100]],'#1a1a1a');
  // Handset
  shape(ctx,[[21,95],[24,95],[26,98],[38,98],[40,95],[43,95],[43,97],[38,100],[26,100],[21,97]],'#222');
  R(ctx,22,96,3,1,'#333');R(ctx,39,96,3,1,'#333');
  // Phone red light
  R(ctx,30,104,4,2,'#cc0000');
  R(ctx,31,104,2,1,'#ff2020');
  // Dial buttons
  for(let bx=0;bx<3;bx++) for(let by=0;by<3;by++) {
    R(ctx,26+bx*4,106+by*2,2,1,'#333');
  }

  // Radio
  R(ctx,50,104,18,9,'#2a2a2a');
  gRect(ctx,52,105,14,6,'#3a3a3a','#2a2a2a');
  R(ctx,50,99,2,5,'#444'); // antenna
  R(ctx,50,98,3,2,'#555');
  R(ctx,55,110,8,3,'#3a3a3a');
  R(ctx,57,111,4,1,'#555');

  // Coffee mug
  shape(ctx,[[85,105],[93,105],[92,112],[86,112]],'#e0e0d8');
  shape(ctx,[[93,106],[96,107],[96,110],[93,111]],'#e0e0d8');
  R(ctx,86,106,6,1,'#f0f0e8'); // rim highlight
  // Coffee inside
  shape(ctx,[[86,107],[92,107],[92,111],[86,111]],'#4a2008');
  R(ctx,87,107,4,1,'#5a3018'); // coffee surface highlight

  // Papers
  R(ctx,100,106,22,7,'#eeeee4');R(ctx,101,106,20,1,'#f4f4ee');
  R(ctx,103,108,16,1,'#bbb');R(ctx,103,110,14,1,'#bbb');
  R(ctx,105,107,8,6,'#e8e8de');  // overlapping paper
  R(ctx,107,109,5,1,'#bbb');

  // Fruit bowl with apple
  ctx.beginPath();ctx.ellipse(78,112,8,3,0,0,Math.PI);ctx.fillStyle='#8a7a58';ctx.fill();
  ctx.beginPath();ctx.ellipse(78,109,7,4,0,0,Math.PI*2);ctx.fillStyle='#cc2020';ctx.fill();
  // Apple highlight
  R(ctx,76,107,2,1,'#e83838');
  // Stem
  R(ctx,78,105,1,3,'#3a6a1a');
  // Leaf
  R(ctx,79,105,2,1,'#4a8a2a');

  // === CHAIR (behind desk, visible above) ===
  R(ctx,60,98,24,4,'#2a2a2a');
  gRect(ctx,62,86,20,12,'#333','#2a2a2a');
  R(ctx,62,86,20,1,'#444');
  R(ctx,64,79,16,7,'#2a2a2a');
  R(ctx,64,79,16,1,'#3a3a3a');

  // === FLOOR DETAILS ===
  // Wastepaper basket
  shape(ctx,[[188,140],[200,140],[198,156],[190,156]],'#606058');
  R(ctx,188,140,12,1,'#707068');
  // Crumpled paper in basket
  R(ctx,191,142,4,3,'#ddd');R(ctx,193,144,3,2,'#ccc');

  ctx.restore();
}

// ============================================================
// SCENE 2: M25 MOTORWAY AT DAWN
// ============================================================
function drawMotorway(ctx) {
  const W=320, H=156;
  ctx.save();

  // === SKY — Rich dawn gradient ===
  gRect(ctx,0,0,W,20,'#0a0818','#141028');
  gRect(ctx,0,20,W,15,'#141028','#28183a');
  gRect(ctx,0,35,W,10,'#28183a','#482838');
  gRect(ctx,0,45,W,8,'#482838','#804028');
  gRect(ctx,0,53,W,5,'#804028','#c06828');
  gRect(ctx,0,58,W,4,'#c06828','#e89038');
  gRect(ctx,0,62,W,3,'#e89038','#f0a848');
  // Sun glow on horizon
  glow(ctx,200,65,50,'rgba(248,180,80,0.3)','rgba(248,180,80,0)');
  glow(ctx,200,65,25,'rgba(255,210,120,0.2)','rgba(255,210,120,0)');

  // Wispy clouds
  for(const [cx,cy,cw] of [[50,20,40],[150,15,35],[260,25,30],[100,35,25]]) {
    ctx.fillStyle='rgba(60,40,50,0.3)';
    ctx.beginPath();ctx.ellipse(cx,cy,cw,3,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(80,50,60,0.2)';
    ctx.beginPath();ctx.ellipse(cx+5,cy-1,cw*0.7,2,0,0,Math.PI*2);ctx.fill();
  }

  // === TREE LINE ===
  for(let tx=0;tx<W;tx++) {
    const th = 5 + Math.sin(tx*0.08)*3 + Math.sin(tx*0.2)*2 + Math.cos(tx*0.35)*1.5;
    const baseY = 64;
    for(let ty=0;ty<th;ty++) {
      const dark = ty/th;
      const r=10+dark*12, g=28+dark*16, b=8+dark*8;
      ctx.fillStyle=`rgb(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)})`;
      ctx.fillRect(tx, baseY-th+ty, 1, 1);
    }
  }
  // Tree trunks (occasional)
  for(const ttx of [30,75,128,195,250,290]) {
    R(ctx,ttx,60,2,6,'#1a1008');
  }

  // === GREEN EMBANKMENT (left) ===
  // Curved organic shape for verge
  shape(ctx,
    [[0,68],[40,68],[50,68,60,70,75,72],[85,76,90,82,90,90],[90,H],[0,H]],
    '#1a4010');
  // Lighter grass layer
  shape(ctx,
    [[0,70],[35,70],[45,70,55,72,68,75],[78,78,82,84,84,92],[84,H],[0,H]],
    '#1e4a14');
  // Grass highlight
  shape(ctx,
    [[0,72],[30,72],[38,72,48,74,58,78],[65,80,70,88,70,94],[70,H],[0,H]],
    '#225018');
  // Individual grass blades
  for(let gx=2;gx<80;gx+=2) {
    const gy = 70 + (gx/80)*20 + Math.sin(gx*0.5)*2;
    if(gy<H-4) {
      ctx.fillStyle = Math.random()>0.5 ? '#2a6020' : '#1a4a10';
      ctx.fillRect(gx, gy, 1, 2+Math.floor(Math.random()*2));
    }
  }

  // Fence posts and wire
  for(let fx=8;fx<68;fx+=12) {
    const fy = 70 + (fx/80)*16;
    R(ctx,fx,fy-8,2,12,'#5a4020');
    R(ctx,fx,fy-8,2,1,'#6a5030');
  }
  // Wire
  curveLine(ctx, [[8,68],[20,69],[32,71],[44,73],[56,75],[65,77]], '#5a4020', 1);
  curveLine(ctx, [[8,72],[20,73],[32,75],[44,77],[56,79],[65,81]], '#5a4020', 1);

  // Fence gap
  R(ctx,56,74,12,1,'#225018');

  // Ponies in field (tiny, distant)
  for(const [px,py] of [[15,73],[28,75],[42,72]]) {
    R(ctx,px,py,4,3,'#8a6a08');R(ctx,px-1,py,2,2,'#8a6a08');
    R(ctx,px,py+3,1,1,'#6a5008');R(ctx,px+2,py+3,1,1,'#6a5008');
  }

  // === ROAD SURFACE ===
  gRect(ctx,78,68,W-78,H-68,'#484848','#3a3a3a');
  // Road texture
  for(let rx=80;rx<W;rx+=3) {
    for(let ry=70;ry<H;ry+=4) {
      if(Math.random()<0.15) {
        ctx.fillStyle=`rgba(${50+Math.random()*20},${50+Math.random()*20},${50+Math.random()*20},0.5)`;
        ctx.fillRect(rx,ry,2,1);
      }
    }
  }

  // Edge line (left)
  R(ctx,80,68,2,H-68,'#ddd');

  // Lane markings
  for(let ly=72;ly<H;ly+=14) {
    R(ctx,148,ly,2,7,'#ccc');
    R(ctx,218,ly,2,7,'#ccc');
  }

  // Hard shoulder line (right)
  R(ctx,288,68,2,H-68,'#ddd');

  // === CRASH BARRIER (right) ===
  for(let bx=292;bx<W;bx+=16) {
    gRect(ctx,bx,75,3,H-75,'#9a9a9a','#7a7a7a');
    R(ctx,bx,75,3,1,'#b0b0b0');
  }
  R(ctx,292,85,W-292,3,'#b0b0b0');R(ctx,292,86,W-292,1,'#888');
  R(ctx,292,100,W-292,3,'#b0b0b0');R(ctx,292,101,W-292,1,'#888');
  R(ctx,292,115,W-292,3,'#b0b0b0');R(ctx,292,116,W-292,1,'#888');
  // Green beyond barrier
  gRect(ctx,298,68,22,7,'#484848','#1a4010');

  // === ROAD CLOSURE ===
  // Cones
  for(const cx of [92,102,112,122]) {
    shape(ctx,[[cx,95],[cx+4,95],[cx+3,88],[cx+1,88]],'#e84400');
    R(ctx,cx+1,90,2,1,'#ffaa00');
    R(ctx,cx-1,95,6,2,'#444');
  }
  // Chevron sign
  R(ctx,85,78,16,12,'#333');
  for(let sx=0;sx<4;sx++) {
    R(ctx,87+sx*3,80+sx,2,2,'#ffaa00');
    R(ctx,87+sx*3,86-sx,2,2,'#ffaa00');
  }

  // === POLICE CAR 1 ===
  drawPoliceCar2(ctx, 130, 98);

  // === POLICE CAR 2 (further) ===
  drawPoliceCar2(ctx, 245, 105);

  // === ROAD MARKINGS ON SURFACE ===
  // Subtle "SLOW" painted on road (very faded)
  ctx.font='6px monospace';ctx.fillStyle='rgba(200,200,200,0.2)';
  ctx.fillText('SLOW',170,140);

  ctx.restore();
}

function drawPoliceCar2(ctx, x, y) {
  // More detailed police car side view
  // Body
  shape(ctx,[[x,y+12],[x+2,y+4],[x+8,y+2],[x+28,y+2],[x+34,y+4],[x+36,y+12]],
    '#e8e8e8');
  // Roof
  shape(ctx,[[x+8,y+2],[x+12,y-2],[x+24,y-2],[x+28,y+2]],'#d8d8d8');
  // Windows
  shape(ctx,[[x+9,y+2],[x+12,y-1],[x+17,y-1],[x+17,y+8]],'#2a4a7a');
  shape(ctx,[[x+19,y-1],[x+24,y-1],[x+27,y+2],[x+27,y+8],[x+19,y+8]],'#2a4a7a');
  // Light bar
  R(ctx,x+14,y-3,4,2,'#3333dd');
  R(ctx,x+19,y-3,4,2,'#3333dd');
  // POLICE stripe
  R(ctx,x+2,y+7,32,2,'#1a2a80');
  // Wheels
  ctx.beginPath();ctx.arc(x+8,y+13,3,0,Math.PI*2);ctx.fillStyle='#1a1a1a';ctx.fill();
  ctx.beginPath();ctx.arc(x+8,y+13,1.5,0,Math.PI*2);ctx.fillStyle='#444';ctx.fill();
  ctx.beginPath();ctx.arc(x+28,y+13,3,0,Math.PI*2);ctx.fillStyle='#1a1a1a';ctx.fill();
  ctx.beginPath();ctx.arc(x+28,y+13,1.5,0,Math.PI*2);ctx.fillStyle='#444';ctx.fill();
  // Headlights
  R(ctx,x,y+6,2,3,'#f8f840');
  R(ctx,x+34,y+6,2,3,'#cc2020');
  // Text
  ctx.font='3px monospace';ctx.fillStyle='#1a2a80';
  ctx.fillText('POLICE',x+4,y+6);
}

// ============================================================
// RENDER ALL
// ============================================================
const SCALE = 3;

// Characters
const charRow = document.getElementById('charRow');
{
  const c=makePanel(charRow,'Paul Anthem (Style C)',40,36,SCALE*2);
  gRect(c,0,0,40,36,'#c0a480','#b09470');
  R(c,0,30,40,6,'#7a7870');
  drawSprite(c, PAUL, P_PAL, 12, 5);
}
{
  const c=makePanel(charRow,'Shetland Pony (new)',44,28,SCALE*2);
  R(c,0,0,44,28,'#484848');
  R(c,0,24,44,4,'#3a3a3a');
  for(let lx=0;lx<44;lx+=10) R(c,lx,22,5,1,'#ccc');
  drawSprite(c, PONY, PO_PAL, 8, 5);
}
{
  const c=makePanel(charRow,'H&H Journalist',40,36,SCALE*2);
  gRect(c,0,0,40,36,'#5a7a4a','#4a6a3a');
  R(c,0,30,40,6,'#7a7a70');
  drawSprite(c, JOURNALIST, J_PAL, 12, 6);
}
{
  // Paul + Pony together on road
  const c=makePanel(charRow,'Scale reference (on road)',80,50,SCALE*1.5);
  R(c,0,0,80,50,'#484848');
  for(let ly=10;ly<50;ly+=14) R(c,38,ly,2,7,'#ccc');
  R(c,0,0,15,50,'#225018');
  drawSprite(c, PAUL, P_PAL, 30, 18);
  drawSprite(c, PONY, PO_PAL, 48, 26);
}

// Station
const stationRow = document.getElementById('stationRow');
{
  const c=makePanel(stationRow,'Police Station — PQ2 VGA style (320x156)',320,156,SCALE);
  drawStation(c);
  // Draw Paul in the scene
  drawSprite(c, PAUL, P_PAL, 100, 124);
}

// Motorway
const motorwayRow = document.getElementById('motorwayRow');
{
  const c=makePanel(motorwayRow,'M25 at Dawn — PQ2 VGA style (320x156)',320,156,SCALE);
  drawMotorway(c);
  // Draw Paul and pony
  drawSprite(c, PAUL, P_PAL, 152, 118);
  drawSprite(c, PONY, PO_PAL, 195, 112);
}
